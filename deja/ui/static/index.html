<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>déjà — memory graph</title>
  <script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
  <style>
    :root {
      color-scheme: dark;
    }
    html, body {
      height: 100%;
      margin: 0;
      background: #0f172a;
      color: #e2e8f0;
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto,
        "Helvetica Neue", Arial, sans-serif;
    }
    #topbar {
      padding: 12px 20px;
      display: flex;
      align-items: baseline;
      gap: 16px;
      border-bottom: 1px solid #1e293b;
    }
    #topbar h1 {
      margin: 0;
      font-size: 18px;
      letter-spacing: 0.02em;
    }
    #topbar small {
      color: #94a3b8;
    }
    #legend {
      margin-left: auto;
      font-size: 12px;
      color: #cbd5e1;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    #legend .swatch {
      display: inline-block;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      margin-right: 4px;
      vertical-align: middle;
    }
    #legend .line {
      display: inline-block;
      width: 14px;
      height: 3px;
      margin-right: 4px;
      vertical-align: middle;
    }
    #graph {
      height: calc(100vh - 56px);
      width: 100vw;
    }
    #status {
      position: fixed;
      right: 12px;
      bottom: 12px;
      font-size: 11px;
      color: #64748b;
      background: rgba(15, 23, 42, 0.7);
      padding: 4px 8px;
      border-radius: 6px;
      border: 1px solid #1e293b;
    }
    /* Floating caption anchored above a freshly-inferred edge — frames the
       memify beat for a 3-second glance the same way a spoken line frames
       it for judges you're not standing in front of. */
    #memify-caption {
      position: absolute;
      transform: translate(-50%, -140%);
      pointer-events: none;
      background: linear-gradient(180deg, #fbbf24 0%, #ec4899 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      font-weight: 700;
      font-size: 15px;
      letter-spacing: 0.02em;
      text-shadow: 0 0 12px rgba(236, 72, 153, 0.35);
      white-space: nowrap;
      opacity: 0;
      transition: opacity 350ms ease-out;
      z-index: 3;
    }
    #memify-caption.visible {
      opacity: 1;
    }
  </style>
</head>
<body>
  <div id="topbar">
    <h1>déjà — memory graph</h1>
    <small>live view of remember / improve / memify / forget</small>
    <div id="legend">
      <span><span class="swatch" style="background:#a78bfa"></span>Learner</span>
      <span><span class="swatch" style="background:#60a5fa"></span>Concept</span>
      <span><span class="swatch" style="background:#34d399"></span>Skill</span>
      <span><span class="swatch" style="background:#94a3b8"></span>Session</span>
      <span><span class="swatch" style="background:#f87171"></span>Mistake</span>
      <span><span class="line" style="background:#ec4899"></span>SAME_FAMILY_AS</span>
      <span><span class="line" style="background:#38bdf8;border-top:1px dashed #38bdf8"></span>RELATED_TO</span>
    </div>
  </div>
  <div id="graph"></div>
  <div id="memify-caption">cross-topic family inferred</div>
  <div id="status">refreshing every 2s…</div>

  <script>
    const container = document.getElementById("graph");
    const statusEl = document.getElementById("status");
    const captionEl = document.getElementById("memify-caption");
    let network = null;
    let nodesDS = new vis.DataSet([]);
    let edgesDS = new vis.DataSet([]);
    let seenEdgeIds = new Set();
    let seenNodeIds = new Set();
    let captionTicker = null;      // rAF handle for keeping the caption pinned during pan/zoom
    let captionHideTimer = null;   // fade-out timer
    let releaseTimer = null;       // camera-release timer

    const options = {
      nodes: {
        shape: "dot",
        font: { color: "#e2e8f0", size: 12, face: "ui-sans-serif" },
        borderWidth: 1,
        color: { border: "#0f172a" },
      },
      edges: {
        font: { color: "#94a3b8", size: 9, strokeWidth: 0 },
        smooth: { type: "continuous" },
      },
      physics: {
        solver: "forceAtlas2Based",
        forceAtlas2Based: {
          gravitationalConstant: -60,
          springLength: 130,
          avoidOverlap: 0.35,
        },
        stabilization: { iterations: 250 },
      },
      interaction: { hover: true, tooltipDelay: 120, zoomView: true },
    };

    async function fetchGraph() {
      try {
        const r = await fetch("/api/graph");
        const data = await r.json();
        applyGraph(data);
        statusEl.textContent =
          `${data.nodes.length} nodes • ${data.edges.length} edges — ${new Date().toLocaleTimeString()}`;
      } catch (e) {
        statusEl.textContent = "fetch failed: " + e.message;
      }
    }

    function applyGraph(data) {
      const newNodeIds = new Set();
      const newEdgeIds = new Set();

      data.nodes.forEach((n) => {
        newNodeIds.add(n.id);
        if (nodesDS.get(n.id)) {
          nodesDS.update(n);
        } else {
          nodesDS.add(n);
          // brief flash — new node
          setTimeout(() => nodesDS.update({ id: n.id }), 100);
        }
      });
      // remove stale nodes (pruned by forget)
      nodesDS.getIds().forEach((id) => {
        if (!newNodeIds.has(id)) nodesDS.remove(id);
      });

      data.edges.forEach((e) => {
        newEdgeIds.add(e.id);
        const existing = edgesDS.get(e.id);
        if (existing) {
          edgesDS.update(e);
        } else {
          // Fresh edge — if it's SAME_FAMILY_AS, flash it for the memify beat
          // and dress the moment (camera pan + fade caption) so a 3-second
          // glance can't miss it.
          const flash =
            e.relationship_name === "SAME_FAMILY_AS" && seenEdgeIds.size > 0;
          edgesDS.add(e);
          if (flash) {
            const orig = e.color?.color || "#ec4899";
            edgesDS.update({
              id: e.id,
              color: { color: "#fbbf24" },
              width: 8,
            });
            setTimeout(() => {
              edgesDS.update({
                id: e.id,
                color: { color: orig },
                width: 4,
              });
            }, 1600);
            // Wait one physics tick so the endpoints have positions before
            // we ask vis.js for them, then dress the beat.
            setTimeout(() => dressMemifyBeat(e.from, e.to), 250);
          }
        }
      });
      edgesDS.getIds().forEach((id) => {
        if (!newEdgeIds.has(id)) edgesDS.remove(id);
      });

      seenEdgeIds = newEdgeIds;
      seenNodeIds = newNodeIds;

      if (!network) {
        network = new vis.Network(
          container,
          { nodes: nodesDS, edges: edgesDS },
          options,
        );
      }
    }

    /**
     * Camera pans/zooms to the midpoint of the two Mistake endpoints on
     * the new SAME_FAMILY_AS edge, holds ~2s, then fits the whole graph
     * back. A floating caption sits above the midpoint the whole time and
     * fades out just before release.
     *
     * Called from applyGraph() on the fresh edge. Safe against overlapping
     * memify runs — it cancels any in-flight camera-release / caption
     * timers before starting a new dress cycle.
     */
    function dressMemifyBeat(fromId, toId) {
      if (!network) return;
      const positions = network.getPositions([fromId, toId]);
      const p1 = positions[fromId];
      const p2 = positions[toId];
      if (!p1 || !p2) return;
      const midpoint = { x: (p1.x + p2.x) / 2, y: (p1.y + p2.y) / 2 };

      // Cancel any prior beat still winding down so we don't get a stuck
      // caption or a fight over the camera.
      if (releaseTimer) clearTimeout(releaseTimer);
      if (captionHideTimer) clearTimeout(captionHideTimer);
      if (captionTicker) cancelAnimationFrame(captionTicker);

      // Pan/zoom toward the new edge. Scale kept modest so surrounding
      // nodes stay visible — the story is "graph re-organized," not
      // "cropped to a duo."
      network.moveTo({
        position: midpoint,
        scale: 1.35,
        animation: { duration: 1200, easingFunction: "easeInOutQuad" },
      });

      // Keep the caption pinned above the midpoint through the pan.
      const updateCaption = () => {
        const dom = network.canvasToDOM(midpoint);
        captionEl.style.left = dom.x + "px";
        captionEl.style.top = dom.y + "px";
        captionTicker = requestAnimationFrame(updateCaption);
      };
      updateCaption();
      captionEl.classList.add("visible");

      captionHideTimer = setTimeout(() => {
        captionEl.classList.remove("visible");
      }, 2000);

      releaseTimer = setTimeout(() => {
        if (captionTicker) {
          cancelAnimationFrame(captionTicker);
          captionTicker = null;
        }
        network.fit({
          animation: { duration: 1000, easingFunction: "easeInOutQuad" },
        });
      }, 2500);
    }

    fetchGraph();
    setInterval(fetchGraph, 2000);
  </script>
</body>
</html>
